name: Nightly Backup (DB + Workflows)
permissions:
  contents: read

on:
  schedule:
    - cron: "23 2 * * *" # daily at 02:23 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:15
    steps:
      - uses: actions/checkout@v4

      - name: Run backup
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          set -euo pipefail
          TS=$(date +%Y%m%d-%H%M%S)
          OUTDIR="workflows/backup/${TS}"
          mkdir -p "$OUTDIR"
          echo "==> Dumping Postgres ..."
          export PGPASSWORD="${DB_PASSWORD}"
          pg_dump -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}" -F c -Z 5 -f "${OUTDIR}/db.dump"
          echo "==> Exporting n8n workflows ..."
          curl -sS -H "X-N8N-API-KEY: ${N8N_API_KEY}" "${N8N_BASE_URL}/rest/workflows" > "${OUTDIR}/workflows.json"
          echo "==> Done. Artifacts at ${OUTDIR}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: n8n-backup
          path: workflows/backup/**
