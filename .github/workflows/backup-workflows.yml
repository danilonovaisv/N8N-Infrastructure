name: Backup n8n Workflows + DB

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq

      - name: Run backup script
        env:
          # n8n API
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          # DB (optional) for pg_dump
          DB_POSTGRESDB_HOST: ${{ secrets.DB_POSTGRESDB_HOST }}
          DB_POSTGRESDB_PORT: ${{ secrets.DB_POSTGRESDB_PORT }}
          DB_POSTGRESDB_DATABASE: ${{ secrets.DB_POSTGRESDB_DATABASE }}
          DB_POSTGRESDB_USER: ${{ secrets.DB_POSTGRESDB_USER }}
          DB_POSTGRESDB_PASSWORD: ${{ secrets.DB_POSTGRESDB_PASSWORD }}
        run: |
          bash scripts/backup.sh

      - name: Upload artifact (backups + workflow JSONs)
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3 # v4.3.1
        with:
          name: n8n-backup
          path: |
            backups/
            workflows/backup/
          retention-days: 30
