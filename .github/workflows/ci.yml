name: Build & Push n8n image (no external actions)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: n8n-custom
  REGISTRY_GHCR: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1) Trazer o código sem usar actions/checkout
      - name: Fetch source via git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git fetch --depth=1 origin ${GITHUB_SHA}
          git checkout FETCH_HEAD
          git status

      # 2) Calcular tags (usa tag vX.Y.Z quando for push em tag)
      - name: Compute tags
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG_LATEST=${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          echo "Version computed: $VERSION"

      # 3) Login no GHCR
      - name: Docker login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # 4) Buildx (sem action) + push
      - name: Ensure buildx
        run: |
          docker buildx version || true
          docker buildx create --name builder --use || docker buildx use builder
          docker buildx inspect --bootstrap

      - name: Build & push (GHCR)
        run: |
          # Se você usar build arg da base do n8n:
          #   --build-arg N8N_BASE_TAG=1.111.0
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag "${{ steps.meta.outputs.IMAGE_TAG }}" \
            --tag "${{ steps.meta.outputs.IMAGE_TAG_LATEST }}" \
            .
