name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

concurrency:
  group: deploy-to-hf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub==0.25.2

      - name: Restart Space and wait until RUNNING
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: danilonovais/n8n-dan
          SPACE_URL: https://danilonovais-n8n-dan.hf.space
        run: |
          python - << 'PY'
          import os, sys, time, traceback
          from huggingface_hub import HfApi
          token = os.environ.get('HF_TOKEN')
          space = os.environ.get('HF_SPACE_NAME')
          if not token or not space:
              print('❌ Missing required secrets. Please set HF_TOKEN and HF_SPACE_NAME in GitHub → Settings → Secrets and variables → Actions', file=sys.stderr)
              sys.exit(1)
          api = HfApi(token=token)
          print(f"Restarting Space: {space}")
          try:
              api.restart_space(repo_id=space)
          except Exception as e:
              print(f"restart_space failed: {e}")
              print('Attempting to request a build...')
              try:
                  api.request_space_build(repo_id=space)
              except Exception as e2:
                  print('request_space_build also failed:')
                  traceback.print_exc()
                  print('\n➡️  Check that:')
                  print(' - HF_TOKEN is valid and has admin/write access to the Space')
                  print(' - HF_SPACE_NAME is in the form "owner/space"')
                  sys.exit(1)
          # Wait for space to be RUNNING
          timeout = time.time() + 900  # 15 minutes
          last_state = None
          while time.time() < timeout:
              try:
                  info = api.space_info(repo_id=space)
              except Exception as e:
                  print(f"space_info error: {e}")
                  time.sleep(10)
                  continue
              state = getattr(getattr(info, 'runtime', None), 'stage', None)
              state = getattr(state, 'value', None) or 'unknown'
              if state != last_state:
                  print(f"Space state: {state}")
                  last_state = state
              if state == 'RUNNING':
                  print('✅ Space is RUNNING')
                  sys.exit(0)
              time.sleep(10)
          print('❌ Timed out waiting for Space to be RUNNING')
          sys.exit(1)
          PY

      - name: Optional health check on Space URL
        env:
          SPACE_URL: https://danilonovais-n8n-dan.hf.space
        run: |
          set -e
          URL1="${SPACE_URL%/}/healthz"
          URL2="${SPACE_URL%/}/health"
          echo "Checking health endpoints: $URL1 or $URL2"
          ok=0
          for i in $(seq 1 12); do
            echo "Attempt $i..."
            if curl -fsS "$URL1" || curl -fsS "$URL2"; then
              echo "✅ Health check passed"
              ok=1
              break
            fi
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "❌ Health check failed after retries" >&2
            exit 1
          fi
