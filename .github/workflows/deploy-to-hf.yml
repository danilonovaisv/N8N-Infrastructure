name: Deploy to Hugging Face Space

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    tags:
      - "n8n-v*"
  workflow_dispatch:

jobs:
  push-to-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@example.com"

      - name: Push to HF Space repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The --force flag is used to overwrite the remote repository.
          # This is common for deploying to Hugging Face Spaces, but use with caution.
          git remote add hf "https://user:${HF_TOKEN}@huggingface.co/spaces/${{ secrets.HF_SPACE_REPO }}"
          git push hf HEAD:main --force
      - name: Trigger Space build
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: danilonovais/n8n-dan
        run: |
          curl -X POST \
            -H "Authorization: Bears " \
            https://huggingface.co/api/spaces//build
