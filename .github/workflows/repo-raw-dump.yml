name: Repo RAW Dump
on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"   # segundas às 03:17 UTC
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip requests

      - name: Run dump
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_READ_TOKEN }}
        run: |
          python github_repo_raw_dump.py --owner danilonovaisv --repo n8n-infrastructure --out repo_raw_dump.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo_raw_dump
          path: repo_raw_dump.json

      - name: Commit to data/raw
        run: |
          mkdir -p data/raw
          mv repo_raw_dump.json data/raw/repo_raw_dump_$(date -u +'%Y-%m-%dT%H-%M-%SZ').json
          git config user.name "raw-dump-bot"
          git config user.email "raw-dump-bot@users.noreply.github.com"
          git add data/raw/*.json
          git commit -m "chore: add weekly RAW dump" || echo "no changes"
          git push || echo "Skip push (no permissions)"
