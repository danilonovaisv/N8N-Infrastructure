name: Sync Knowledge Base to Supabase

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install runtime deps for sync script
        run: |
          npm i --no-save @supabase/supabase-js openai

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          KNOWLEDGE_REPO_URL: ${{ secrets.KNOWLEDGE_REPO_URL }}
          KNOWLEDGE_DIRS: ${{ secrets.KNOWLEDGE_DIRS }}
        run: |
          node scripts/sync-knowledge.mjs

