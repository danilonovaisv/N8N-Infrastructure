name: Sync Knowledge Base

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install runtime deps for sync script
        run: |
          npm i --no-save openai

      - name: Run sync script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAW_TOKEN: ${{ secrets.CLAW_TOKEN }}
          KNOWLEDGE_REPO_URL: ${{ secrets.KNOWLEDGE_REPO_URL }}
          KNOWLEDGE_DIRS: ${{ secrets.KNOWLEDGE_DIRS }}
        run: |
          node scripts/sync-knowledge.mjs

