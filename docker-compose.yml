version: "3.9"
services:
  n8n:
    # A imagem será construída a partir do seu Dockerfile ao usar 'docker-compose build'
    # ou quando o ClawCloud fizer o deploy a partir do seu repositório.
    build: .
    image: danilonovaisv/n8n-custom:1.111.0
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- As variáveis abaixo devem ser definidas no ambiente de deploy (ex: ClawCloud UI) ---
      # --- ou em um arquivo .env para desenvolvimento local ---

      # ===== Base URL / Webhooks (claw.cloud) =====
      N8N_HOST: n8n-mjgxheeo.us-west-1.clawcloudrun.com # Ex: your-n8n-app.claw.cloud
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n-mjgxheeo.us-west-1.clawcloudrun.com # Ex: https://your-n8n-app.claw.cloud/

      # ===== Pastas e persistência =====
      N8N_USER_FOLDER: /data/.n8n

      # ===== Segurança / Criptografia =====
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_API_KEY: ${N8N_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_METRICS: ${N8N_METRICS:-true}

      # ===== Database Configuration (PostgreSQL on claw.cloud) =====
      DB_TYPE: ${DB_TYPE}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD}
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE}
      DB_POSTGRESDB_CONNECTION: ${DB_POSTGRESDB_CONNECTION}

      # ===== Integrações =====
      GOOGLE_CREDENTIALS_PATH: /data/.n8n/credentials/google-service-account.json

    volumes:
      - n8n_data:/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/rest/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  n8n_data:
