version: "3.9"
services:
  n8n:
    # A imagem será construída a partir do seu Dockerfile ao usar 'docker-compose build'
    # ou quando o ClawCloud fizer o deploy a partir do seu repositório.
    build: .
    image: danilonovaisv/n8n-custom:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # --- As variáveis abaixo devem ser definidas no ambiente de deploy (ex: ClawCloud UI) ---
      # --- ou em um arquivo .env para desenvolvimento local ---

      # ===== Base URL / Webhooks (Exemplo para ClawCloud) =====
      N8N_HOST: ${N8N_HOST} # Ex: n8n-dan-abcd.us-west-1.run.claw.cloud
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${WEBHOOK_URL} # Ex: https://n8n-dan-abcd.us-west-1.run.claw.cloud/

      # ===== Pastas e persistência =====
      N8N_USER_FOLDER: /data/.n8n

      # ===== Segurança / Criptografia =====
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_API_KEY: ${N8N_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_METRICS: ${N8N_METRICS:-true}

      # ===== Banco de Dados =====
      DB_TYPE: postgresdb
      DB_POSTGRESDB_CONNECTION_STRING: ${DB_POSTGRESDB_CONNECTION_STRING}
      DB_POSTGRESDB_SSL: "true"
      DB_POSTGRESDB_SSL_CA: /data/.n8n/ca.pem
      # DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: "false" # Use apenas se necessário

      # ===== Integrações =====
      GOOGLE_CREDENTIALS_PATH: /data/.n8n/credentials/google-service-account.json

    volumes:
      - n8n_data:/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/rest/health"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  n8n_data:
