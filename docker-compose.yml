version: "3.9"
services:
  n8n:
    image: n8nio/n8n:1.104.2
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # ===== Base URL / Webhooks =====
      N8N_HOST: danilonovais-n8n-dan.hf.space
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://danilonovais-n8n-dan.hf.space/

      # ===== Pastas e persistência =====
      N8N_USER_FOLDER: /data/.n8n

      # ===== Segurança / Criptografia =====
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_API_KEY: ${N8N_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
      N8N_METRICS: ${N8N_METRICS:-true}

      # ===== Banco (Supabase) =====
      DB_TYPE: postgresdb
      DB_POSTGRESDB_CONNECTION_STRING: ${DB_POSTGRESDB_CONNECTION_STRING}
      DB_POSTGRESDB_SSL: "true"
      # Se tiver erro de CA, ative a linha abaixo (menos seguro):
      # DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: "false"
      # Alternativa segura: usar CA (baixe o certificado da Supabase e monte em /data/.n8n/ca.pem)
      # DB_POSTGRESDB_SSL_CA: /data/.n8n/ca.pem

      # ===== Integrações (ex.: caminhos de credenciais) =====
      GOOGLE_CREDENTIALS_PATH: /data/.n8n/credentials/google-service-account.json

    volumes:
      - n8n_data:/data
volumes:
  n8n_data:
