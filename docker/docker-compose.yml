services:
  n8n:
    image: n8nio/n8n:1.53.1
    container_name: N8N-Infrastructure
    restart: unless-stopped
    env_file:
      - ../config/.env
    ports:
      - "6543:6543"
    environment:
      # Force SSL for DB
      - DB_POSTGRESDB_SSL=true
      # Community nodes
      - N8N_ENABLE_COMMUNITY_NODES=${N8N_ENABLE_COMMUNITY_NODES:-true}
      - N8N_COMMUNITY_PACKAGES=${N8N_COMMUNITY_PACKAGES:-["n8n-nodes-langchain","n8n-nodes-google","n8n-nodes-vertexai"]}
      # n8n basics
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-6543}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-https://danilonovais-n8n-dan.hf.space}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../workflows:/data/workflows:rw
      - ../knowledge:/data/knowledge:rw
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6543/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Optional vector DB for local development (use Supabase+pgvector in prod)
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  n8n_data:
  qdrant_data:
